name: Auto Update File

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # Runs daily at 04:00 UTC

permissions:
  contents: write

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update target file
        run: |
          # Replace this command with the real command that updates your file.
          # Example below appends a timestamp to update-log.txt.
          echo "Updated on $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> update-log.txt

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto update file"
          git push
