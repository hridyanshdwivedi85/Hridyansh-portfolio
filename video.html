<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Experience | Hridyansh Dwivedi</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .video-shell {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    #player {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      border: 0;
      background: #000;
    }

    .cover-strip {
      position: absolute;
      left: 0;
      width: 100%;
      height: 88px;
      background: #000;
      z-index: 5;
      pointer-events: none;
    }

    .cover-strip.top { top: 0; }
    .cover-strip.bottom { bottom: 0; }

    .start-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.25rem;
      background: radial-gradient(circle at center, rgba(20, 20, 20, 0.45), rgba(0, 0, 0, 0.9));
    }

    .start-card {
      max-width: 420px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      padding: 1rem 1.1rem;
      color: rgba(255, 255, 255, 0.95);
    }

    .start-card h1 {
      margin: 0 0 0.55rem;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .start-card p {
      margin: 0;
      font-size: 0.85rem;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.8);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="video-shell" aria-label="Full screen video playback">
    <div id="player" aria-label="Video player"></div>
    <div class="cover-strip top" aria-hidden="true"></div>
    <div class="cover-strip bottom" aria-hidden="true"></div>
  </main>

  <div id="start-overlay" class="start-overlay" role="dialog" aria-modal="true" aria-label="Start video">
    <div class="start-card">
      <h1>Tap to start video</h1>
      <p>Landscape mode enters full screen automatically for distraction-free playback.</p>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const VIDEO_ID = 'TBikbn5XJhg';
    const START_OVERLAY = document.getElementById('start-overlay');

    let player;

    function isLandscapeMobile() {
      return window.matchMedia('(max-width: 1024px) and (orientation: landscape)').matches;
    }

    function requestFullscreen() {
      const el = document.documentElement;
      if (document.fullscreenElement) return Promise.resolve();
      if (el.requestFullscreen) return el.requestFullscreen();
      if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      return Promise.resolve();
    }

    async function startPlayback() {
      await requestFullscreen().catch(() => {});
      if (!player) return;
      player.unMute();
      player.playVideo();
      START_OVERLAY.classList.add('hidden');
    }

    function playMutedAutostart() {
      if (!player) return;
      player.mute();
      player.playVideo();
    }

    async function syncLandscapeFullscreen() {
      if (isLandscapeMobile()) {
        await requestFullscreen().catch(() => {});
      }
    }

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        videoId: VIDEO_ID,
        playerVars: {
          autoplay: 1,
          controls: 0,
          disablekb: 1,
          fs: 0,
          iv_load_policy: 3,
          modestbranding: 1,
          rel: 0,
          playsinline: 1,
          cc_load_policy: 0,
          origin: window.location.origin
        },
        events: {
          onReady: async () => {
            playMutedAutostart();
            await syncLandscapeFullscreen();
          }
        }
      });
    };

    START_OVERLAY.addEventListener('click', startPlayback, { passive: true });
    window.addEventListener('resize', syncLandscapeFullscreen);
    window.addEventListener('orientationchange', syncLandscapeFullscreen);
  </script>
</body>
</html>
