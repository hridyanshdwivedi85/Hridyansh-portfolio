<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Runner | Hridyansh Dwivedi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dino.css" />
</head>
<body>
  <main class="dino-shell">
    <header class="dino-topbar">
      <a class="back-link" href="index.html" aria-label="Back to home">← Home</a>
      <h1>Dino Runner</h1>
    </header>

    <section class="game-wrap" aria-label="Chrome Dino style game">
      <canvas id="game" width="600" height="150" aria-label="Dino game canvas"></canvas>

      <div class="hud">
        <span id="score">00000</span>
        <span id="hi">HI 00000</span>
      </div>

      <div id="overlay" class="overlay visible" role="status" aria-live="polite">
        <p class="overlay-title">Press Space / Tap to Start</p>
        <p class="overlay-sub">Jump: Space, ↑, Tap &nbsp;|&nbsp; Duck: ↓ or hold DUCK</p>
      </div>
    </section>

    <div class="mobile-controls" aria-label="Touch controls">
      <button id="jumpBtn" class="ctrl-btn jump">JUMP</button>
      <button id="duckBtn" class="ctrl-btn duck">DUCK</button>
    </div>
  </main>

  <script src="dino.js"></script>
</body>
</html>
